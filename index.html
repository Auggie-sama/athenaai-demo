<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AthenaAI — Title Insurance Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #050505;
      --panel: #0e0e0e;
      --gold: #d6b25e;
      --gold-glow: rgba(214, 178, 94, 0.18);
      --text: #f6f6f6;
      --muted: #9a9a9a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at top left, #141414, #000);
      color: var(--text);
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      background: linear-gradient(180deg, #0b0b0b, #030303);
      padding: 28px 22px;
      border-right: 1px solid var(--gold-glow);
    }

    .sidebar h2 {
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 32px;
      font-weight: 600;
    }

    .nav-item {
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 20px;
      font-size: 15px;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 36px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-size: 30px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 30px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding-right: 12%;
    }

    .message {
      max-width: 740px;
      padding: 20px 22px;
      border-radius: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .bot {
      background:
        linear-gradient(180deg, #111, #0a0a0a);
      border: 1px solid var(--gold-glow);
      box-shadow: 0 0 40px rgba(214,178,94,0.06);
    }

    .user {
      align-self: flex-end;
      background: rgba(214,178,94,0.1);
      border: 1px solid rgba(214,178,94,0.35);
    }

    .input-bar {
      display: flex;
      gap: 14px;
      margin-top: 22px;
    }
