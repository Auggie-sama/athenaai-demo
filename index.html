<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AthenaAI — Title Insurance Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --gold: #d4a73b;
      --gold-soft: rgba(212, 167, 59, 0.15);
      --text: #f5f5f5;
      --muted: #aaaaaa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: var(--text);
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #0f0f0f, #050505);
      padding: 24px;
      border-right: 1px solid var(--gold-soft);
    }

    .sidebar h2 {
      color: var(--gold);
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .nav-item {
      color: var(--gold);
      margin-bottom: 18px;
      opacity: 0.85;
    }

    .main {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      color: var(--gold);
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--muted); margin-bottom: 32px; }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-right: 10%;
      overflow-y: auto;
    }

    .message {
      max-width: 720px;
      padding: 18px 20px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .bot {
      background: #0d0d0d;
      border: 1px solid var(--gold-soft);
    }

    .user {
      background: rgba(212, 167, 59, 0.08);
      border: 1px solid rgba(212, 167, 59, 0.25);
      align-self: flex-end;
    }

    .input-bar {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .input-bar input {
      flex: 1;
      background: #0c0c0c;
      border: 1px solid var(--gold-soft);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
    }

    .input-bar button {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 0 22px;
      font-size: 18px;
      cursor: pointer;
    }

    footer {
      font-size: 12px;
      color: #777;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <aside class="sidebar">
    <h2>ATHENA</h2>
    <div class="nav-item">Browse</div>
    <div class="nav-item">Secure</div>
    <div class="nav-item">Title Insights</div>
    <div class="nav-item">Risk Analysis</div>
    <div class="nav-item">Reports</div>
  </aside>

  <main class="main">
    <div class="brand">🦉 ATHENA</div>
    <div class="subtitle">Title insurance clarity, without the jargon.</div>

    <section class="chat" id="chat">
      <div class="message bot">
        Consult a legal professional for legal decision-making.
        <br><br>
        Hello, I’m AthenaAI. What title insurance question can I help with?
      </div>
    </section>

    <div class="input-bar">
      <input id="input" placeholder="Ask a title insurance question…" />
      <button onclick="send()">→</button>
    </div>

    <footer>
      Prototype demo only. Not legal advice.
    </footer>
  </main>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');

const DISCLAIMER = "Consult a legal professional for legal decision-making.\n\n";

const RESPONSES = [
  { key: "schedule b", text: "Schedule B lists exceptions to title insurance coverage, such as recorded easements, liens, covenants, and other matters that affect title but are not insured unless addressed." },
  { key: "lien", text: "A lien is a recorded claim against a property, often due to unpaid debts. Title insurance typically excepts existing liens unless cleared prior to closing." },
  { key: "easement", text: "An easement grants specific usage rights over a property to another party, such as utilities or access. These are commonly disclosed and excepted in title commitments." },
  { key: "commitment", text: "A title commitment outlines the conditions, requirements, and exceptions under which a title insurance policy would be issued." },
  { key: "owner", text: "An owner’s policy protects the property owner against covered title defects for as long as the owner holds an interest in the property." },
  { key: "lender", text: "A lender’s policy protects the mortgage lender’s interest in the property and typically remains in effect until the loan is satisfied." }
];

function send() {
  const question = input.value.trim();
  if (!question) return;

  addMessage(question, 'user');
  input.value = '';

  const response = getResponse(question.toLowerCase());
  typeResponse(DISCLAIMER + response);
}

function getResponse(text) {
  for (const r of RESPONSES) {
    if (text.includes(r.key)) return r.text;
  }
  return "Title insurance helps protect against certain defects, liens, or claims that could affect ownership. If you can provide more detail, I can explain further.";
}

function addMessage(text, role) {
  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function typeResponse(fullText) {
  const msg = document.createElement('div');
  msg.className = 'message bot';
  chat.appendChild(msg);

  let i = 0;
  const interval = setInterval(() => {
    msg.textContent += fullText.charAt(i);
    i++;
    chat.scrollTop = chat.scrollHeight;
    if (i >= fullText.length) clearInterval(interval);
  }, 18);
}
</script>
</body>
</html>
